<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股價值選股雷達 - 專業版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

<div id="app" v-cloak>
    <header class="bg-[#2d336b] text-white p-6 sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black italic tracking-tighter"><i class="fa-solid fa-bolt text-yellow-400 mr-2"></i>台股雷達</h1>
            
            <div class="flex flex-col md:flex-row gap-4 w-full md:flex-1 md:justify-end">
                <div class="relative md:w-72">
                    <i class="fa-solid fa-search absolute left-4 top-3.5 text-white/50"></i>
                    <input v-model="search" type="text" placeholder="搜尋代碼或名稱..." 
                           class="w-full bg-white/10 border border-white/20 rounded-xl py-2.5 pl-11 pr-4 focus:ring-2 ring-yellow-400 focus:outline-none">
                </div>
                <select v-model="selectedCat" class="bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 font-bold focus:outline-none md:w-64">
                    <option value="">所有中文產業分類</option>
                    <option v-for="c in categories" :value="c" class="text-black">{{ c }}</option>
                </select>
                <button @click="loadData" class="bg-white/20 px-4 py-2 rounded-xl text-xs hover:bg-white/30 transition">重載數據</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-6">
        <div v-for="pg in priceGroups" :key="pg.label" class="mb-6">
            <div @click="pg.isOpen = !pg.isOpen" 
                 class="bg-white p-5 rounded-2xl shadow-sm border-l-[12px] border-[#2d336b] cursor-pointer flex justify-between items-center hover:bg-slate-50 transition">
                <span class="text-xl font-black text-slate-800">{{ pg.label }} <span class="text-sm font-bold text-slate-400 ml-2">({{ pg.count }} 檔)</span></span>
                <i class="fa-solid text-slate-300" :class="pg.isOpen ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
            </div>

            <div v-show="pg.isOpen" class="mt-4 ml-2 md:ml-6 space-y-4">
                <div v-for="yg in pg.yieldGroups" :key="yg.label" v-show="yg.items.length > 0">
                    <div @click="yg.isOpen = !yg.isOpen" class="bg-slate-200/50 p-3 rounded-xl cursor-pointer flex items-center gap-3">
                        <div :class="yg.color" class="w-3 h-3 rounded-full"></div>
                        <span class="font-black text-slate-600 text-sm uppercase">{{ yg.label }}</span>
                        <i class="fa-solid fa-caret-down text-slate-400 ml-auto mr-2"></i>
                    </div>

                    <div v-show="yg.isOpen" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-4 px-2">
                        <div v-for="s in yg.items" :key="s.id" class="bg-white p-6 rounded-[2.5rem] shadow-md border border-slate-50 relative group">
                            <div class="absolute top-0 left-0 bg-indigo-600 text-white px-4 py-1.5 rounded-br-2xl text-[10px] font-black">
                                {{ s.category }}
                            </div>
                            <div class="text-right text-2xl font-black text-slate-900 mb-1">${{ s.price }}</div>
                            <div class="mb-4">
                                <span class="text-slate-400 text-xs font-bold tracking-widest">{{ s.id }}</span>
                                <h3 class="text-xl font-black text-slate-800">{{ s.name }}</h3>
                            </div>
                            <div class="flex gap-2 mb-4">
                                <div class="flex-1 bg-amber-50 p-3 rounded-2xl border border-amber-100 text-center">
                                    <div class="text-[10px] font-bold text-amber-600">合計殖利率</div>
                                    <div class="text-lg font-black text-amber-700">{{ s.totalYield }}%</div>
                                </div>
                                <div class="flex-1 bg-blue-50 p-3 rounded-2xl border border-blue-100 text-center">
                                    <div class="text-[10px] font-bold text-blue-600">淨值比(PBR)</div>
                                    <div class="text-lg font-black text-blue-700">{{ s.pbr }}</div>
                                </div>
                            </div>
                            <a :href="'https://www.wantgoo.com/stock/' + s.id" target="_blank" 
                               class="block w-full py-2 bg-slate-50 rounded-xl text-center text-xs font-bold text-slate-400 group-hover:bg-[#2d336b] group-hover:text-white transition-all">
                                查看詳細技術線圖 <i class="fa-solid fa-chart-line ml-1"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                stocks: [], search: '', selectedCat: '',
                priceGroups: [
                    { label: "股價 300 以上", min: 300, max: 99999, isOpen: true, count: 0, yieldGroups: [] },
                    { label: "股價 100 - 300", min: 100, max: 300, isOpen: true, count: 0, yieldGroups: [] },
                    { label: "股價 50 - 100", min: 50, max: 100, isOpen: false, count: 0, yieldGroups: [] },
                    { label: "股價 20 - 50", min: 20, max: 50, isOpen: false, count: 0, yieldGroups: [] },
                    { label: "股價 0 - 20", min: 0, max: 20, isOpen: false, count: 0, yieldGroups: [] }
                ]
            }
        },
        computed: {
            categories() {
                // 獲取所有不重複的中文產業名稱
                const cats = this.stocks.map(s => s.category);
                return [...new Set(cats)].filter(c => c && c !== '其他').sort();
            }
        },
        watch: {
            search() { this.processData(); },
            selectedCat() { this.processData(); },
            stocks() { this.processData(); }
        },
        methods: {
            async loadData() {
                try {
                    const res = await fetch('./data.json?v=' + Date.now());
                    this.stocks = await res.json();
                } catch (e) { console.error("資料加載失敗"); }
            },
            processData() {
                const filtered = this.stocks.filter(s => 
                    (s.name.includes(this.search) || s.id.includes(this.search)) &&
                    (this.selectedCat === '' || s.category === this.selectedCat)
                );
                this.priceGroups.forEach(pg => {
                    const inPrice = filtered.filter(s => s.price >= pg.min && s.price < pg.max);
                    pg.count = inPrice.length;
                    pg.yieldGroups = [
                        { label: "合計殖利率 10% 以上", color: "bg-red-500", isOpen: true, items: inPrice.filter(s => s.totalYield >= 10).sort((a,b)=>b.totalYield-a.totalYield) },
                        { label: "合計殖利率 5 - 10%", color: "bg-green-500", isOpen: true, items: inPrice.filter(s => s.totalYield >= 5 && s.totalYield < 10).sort((a,b)=>b.totalYield-a.totalYield) },
                        { label: "合計殖利率 0 - 5%", color: "bg-gray-400", isOpen: false, items: inPrice.filter(s => s.totalYield < 5).sort((a,b)=>b.totalYield-a.totalYield) }
                    ];
                });
            }
        },
        mounted() { this.loadData(); }
    }).mount('#app');
</script>
</body>
</html>
